<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-6 py-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-4xl font-bold mb-2">
                        <i class="fas fa-cloud-upload-alt mr-3"></i>
                        File Uploader Statistics
                    </h1>
                    <p class="text-xl opacity-90">实时监控和统计数据</p>
                </div>
                <div class="text-right">
                    <div class="flex space-x-4">
                        <a href="https://www.github.com/52op/file_uploader" target="_blank" 
                           class="bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-lg transition-all duration-300">
                            <i class="fab fa-github mr-2"></i>GitHub
                        </a>
                        <a href="https://blog.sztcrs.com" target="_blank" 
                           class="bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-lg transition-all duration-300">
                            <i class="fas fa-blog mr-2"></i>Blog
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="stat-card rounded-xl p-6 text-white card-hover" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-white bg-opacity-20">
                        <i class="fas fa-file-upload text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm opacity-80">总上传数</p>
                        <p class="text-2xl font-bold" id="total-uploads">-</p>
                    </div>
                </div>
            </div>

            <div class="stat-card rounded-xl p-6 text-white card-hover" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-white bg-opacity-20">
                        <i class="fas fa-files-o text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm opacity-80">总文件数</p>
                        <p class="text-2xl font-bold" id="total-files">-</p>
                    </div>
                </div>
            </div>

            <div class="stat-card rounded-xl p-6 text-white card-hover" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-white bg-opacity-20">
                        <i class="fas fa-hdd text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm opacity-80">存储使用</p>
                        <p class="text-2xl font-bold" id="total-size">-</p>
                    </div>
                </div>
            </div>

            <div class="stat-card rounded-xl p-6 text-white card-hover" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-white bg-opacity-20">
                        <i class="fas fa-clock text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm opacity-80">运行时间</p>
                        <p class="text-2xl font-bold" id="uptime">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts and Details -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Performance Chart -->
            <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
                <h3 class="text-xl font-bold mb-4 text-gray-800">
                    <i class="fas fa-chart-line mr-2 text-blue-500"></i>
                    性能指标
                </h3>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>

            <!-- Storage Distribution -->
            <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
                <h3 class="text-xl font-bold mb-4 text-gray-800">
                    <i class="fas fa-chart-pie mr-2 text-green-500"></i>
                    存储分布
                </h3>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="storageChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Detailed Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- File Operations -->
            <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
                <h3 class="text-xl font-bold mb-4 text-gray-800">
                    <i class="fas fa-tasks mr-2 text-purple-500"></i>
                    文件操作
                </h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">上传次数</span>
                        <span class="font-bold text-blue-600" id="detail-uploads">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">删除次数</span>
                        <span class="font-bold text-red-600" id="detail-deletes">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">访问次数</span>
                        <span class="font-bold text-green-600" id="detail-accesses">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">批量上传</span>
                        <span class="font-bold text-indigo-600" id="detail-batch-uploads">-</span>
                    </div>
                </div>
            </div>

            <!-- Error Statistics -->
            <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
                <h3 class="text-xl font-bold mb-4 text-gray-800">
                    <i class="fas fa-exclamation-triangle mr-2 text-red-500"></i>
                    错误统计
                </h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">上传错误</span>
                        <span class="font-bold text-red-600" id="upload-errors">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">删除错误</span>
                        <span class="font-bold text-red-600" id="delete-errors">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">访问错误</span>
                        <span class="font-bold text-red-600" id="access-errors">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">批量错误</span>
                        <span class="font-bold text-red-600" id="batch-errors">-</span>
                    </div>
                </div>
            </div>

            <!-- Image Processing -->
            <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
                <h3 class="text-xl font-bold mb-4 text-gray-800">
                    <i class="fas fa-image mr-2 text-yellow-500"></i>
                    图片处理
                </h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">缩略图生成</span>
                        <span class="font-bold text-green-600" id="thumbnails-generated">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">处理错误</span>
                        <span class="font-bold text-red-600" id="thumbnail-errors">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">平均上传时间</span>
                        <span class="font-bold text-blue-600" id="avg-upload-time">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">平均文件大小</span>
                        <span class="font-bold text-purple-600" id="avg-file-size">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- System Info -->
        <div class="mt-8 bg-white rounded-xl shadow-lg p-6 card-hover">
            <h3 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fas fa-info-circle mr-2 text-blue-500"></i>
                系统信息
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="text-center">
                    <p class="text-gray-600">最后更新</p>
                    <p class="font-bold text-gray-800" id="last-update">-</p>
                </div>
                <div class="text-center">
                    <p class="text-gray-600">存储数量</p>
                    <p class="font-bold text-gray-800" id="storage-count">-</p>
                </div>
                <div class="text-center">
                    <p class="text-gray-600">运行状态</p>
                    <p class="font-bold text-green-600">
                        <i class="fas fa-check-circle mr-1"></i>正常运行
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-6 text-center">
            <p class="mb-4">
                <i class="fas fa-code mr-2"></i>
                Powered by Go File Uploader
            </p>
            <div class="flex justify-center space-x-6">
                <a href="https://www.github.com/52op/file_uploader" target="_blank" 
                   class="hover:text-blue-400 transition-colors duration-300">
                    <i class="fab fa-github text-xl"></i>
                </a>
                <a href="https://blog.sztcrs.com" target="_blank" 
                   class="hover:text-blue-400 transition-colors duration-300">
                    <i class="fas fa-blog text-xl"></i>
                </a>
                <a href="/metrics" target="_blank" 
                   class="hover:text-blue-400 transition-colors duration-300">
                    <i class="fas fa-chart-bar text-xl"></i>
                </a>
            </div>
        </div>
    </footer>

    <script>
        let isUpdating = false;
        let updateTimer = null;
        let updateCount = 0;

        // 数据更新函数
        async function updateStats() {
            updateCount++;
            console.log(`[DEBUG] updateStats called - count: ${updateCount}, isUpdating: ${isUpdating}`);

            if (isUpdating) {
                console.log('[DEBUG] Update already in progress, skipping');
                return;
            }
            isUpdating = true;

            try {
                console.log('[DEBUG] Fetching stats from /api/stats');
                const response = await fetch('/api/stats');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                console.log('[DEBUG] Stats data received:', data);

                // 安全更新DOM元素
                const updateElement = (id, value) => {
                    const element = document.getElementById(id);
                    if (element) {
                        const oldValue = element.textContent;
                        if (oldValue !== value) {
                            console.log(`[DEBUG] Updating ${id}: ${oldValue} -> ${value}`);
                            element.textContent = value;
                        }
                    } else {
                        console.warn(`[DEBUG] Element not found: ${id}`);
                    }
                };

                // 更新快速统计
                updateElement('total-uploads', data.total_uploads || 0);
                updateElement('total-files', data.total_files || 0);
                updateElement('total-size', data.total_size_mb ? data.total_size_mb.toFixed(2) + ' MB' : '0 MB');
                updateElement('uptime', data.uptime_human || '0s');

                // 更新详细统计
                updateElement('detail-uploads', data.total_uploads || 0);
                updateElement('detail-deletes', data.total_deletes || 0);
                updateElement('detail-accesses', data.total_accesses || 0);
                updateElement('detail-batch-uploads', data.batch_uploads || 0);

                // 更新错误统计
                updateElement('upload-errors', data.upload_errors || 0);
                updateElement('delete-errors', data.delete_errors || 0);
                updateElement('access-errors', data.access_errors || 0);
                updateElement('batch-errors', data.batch_errors || 0);

                // 更新图片处理统计
                updateElement('thumbnails-generated', data.thumbnails_generated || 0);
                updateElement('thumbnail-errors', data.thumbnail_errors || 0);
                updateElement('avg-upload-time', data.avg_upload_time || '0s');
                updateElement('avg-file-size', data.avg_file_size || '0KB');

                // 更新系统信息
                updateElement('last-update', data.last_update || '-');
                updateElement('storage-count', data.storage_count || 0);

                // 更新图表数据（避免重复渲染）
                updateCharts(data);
                console.log('[DEBUG] Stats update completed successfully');

            } catch (error) {
                console.error('[ERROR] Failed to update stats:', error);
                // 显示错误状态
                const elements = document.querySelectorAll('[id$="-uploads"], [id$="-files"], [id$="-size"], [id$="-errors"]');
                elements.forEach(el => {
                    if (el.textContent === '-') {
                        el.textContent = 'Error';
                        el.style.color = '#ef4444';
                    }
                });
            } finally {
                console.log('[DEBUG] Setting isUpdating to false');
                isUpdating = false;
            }
        }

        // 更新图表数据
        function updateCharts(data) {
            if (!chartsInitialized) return;

            try {
                // 更新性能图表
                if (performanceChart && data) {
                    const newData = [
                        data.total_uploads || 0,
                        data.total_deletes || 0,
                        data.total_accesses || 0,
                        data.batch_uploads || 0
                    ];

                    // 只有数据变化时才更新
                    const currentData = performanceChart.data.datasets[0].data;
                    const hasChanged = newData.some((val, index) => val !== currentData[index]);

                    if (hasChanged) {
                        performanceChart.data.datasets[0].data = newData;
                        performanceChart.update('none'); // 使用'none'模式避免动画
                    }
                }

                // 更新存储图表
                if (storageChart && data) {
                    // 这里可以根据实际存储数据更新
                    // 暂时保持静态数据
                }
            } catch (error) {
                console.error('Failed to update charts:', error);
            }
        }
        
        let performanceChart = null;
        let storageChart = null;
        let chartsInitialized = false;

        // 初始化图表
        function initCharts() {
            console.log('[DEBUG] initCharts called, chartsInitialized:', chartsInitialized);
            if (chartsInitialized) {
                console.log('[DEBUG] Charts already initialized, skipping');
                return;
            }

            try {
                console.log('[DEBUG] Initializing charts...');
                // 性能指标图表
                const performanceCtx = document.getElementById('performanceChart');
                if (performanceCtx) {
                    console.log('[DEBUG] Creating performance chart');
                    performanceChart = new Chart(performanceCtx.getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: ['上传', '删除', '访问', '批量操作'],
                            datasets: [{
                                label: '操作次数',
                                data: [0, 0, 0, 0],
                                borderColor: 'rgb(75, 192, 192)',
                                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                                tension: 0.1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: false, // 禁用动画避免重复渲染
                            interaction: {
                                intersect: false,
                            },
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top',
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                }

                // 存储分布图表
                const storageCtx = document.getElementById('storageChart');
                if (storageCtx) {
                    storageChart = new Chart(storageCtx.getContext('2d'), {
                        type: 'doughnut',
                        data: {
                            labels: ['本地存储', 'S3存储'],
                            datasets: [{
                                data: [100, 0],
                                backgroundColor: [
                                    'rgba(255, 99, 132, 0.8)',
                                    'rgba(54, 162, 235, 0.8)'
                                ]
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: false, // 禁用动画避免重复渲染
                            interaction: {
                                intersect: false,
                            },
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top',
                                }
                            }
                        }
                    });
                }

                chartsInitialized = true;
                console.log('Charts initialized successfully');
            } catch (error) {
                console.error('Failed to initialize charts:', error);
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing...');

            // 延迟初始化图表，确保DOM完全加载
            setTimeout(() => {
                initCharts();
                updateStats();

                // 每30秒更新一次数据，使用setTimeout避免重叠
                window.scheduleUpdate = function() {
                    console.log('[DEBUG] scheduleUpdate called, updateTimer exists:', !!updateTimer);
                    if (updateTimer) {
                        console.log('[DEBUG] Clearing existing timer');
                        clearTimeout(updateTimer);
                    }
                    updateTimer = setTimeout(() => {
                        console.log('[DEBUG] Timer triggered, isUpdating:', isUpdating);
                        if (!isUpdating) {
                            console.log('[DEBUG] Starting stats update');
                            updateStats().finally(() => {
                                console.log('[DEBUG] Stats update finished, scheduling next update');
                                window.scheduleUpdate(); // 递归调度下次更新
                            });
                        } else {
                            console.log('[DEBUG] Update in progress, rescheduling');
                            window.scheduleUpdate(); // 如果正在更新，直接调度下次
                        }
                    }, 30000);
                    console.log('[DEBUG] New timer scheduled for 30 seconds');
                };

                console.log('[DEBUG] Starting initial update schedule');
                window.scheduleUpdate();
            }, 100);
        });

        // 页面卸载时清理资源
        window.addEventListener('beforeunload', function() {
            if (updateTimer) {
                clearTimeout(updateTimer);
                updateTimer = null;
            }

            // 销毁图表实例
            if (performanceChart) {
                performanceChart.destroy();
                performanceChart = null;
            }
            if (storageChart) {
                storageChart.destroy();
                storageChart = null;
            }

            chartsInitialized = false;
        });

        // 页面可见性变化时暂停/恢复更新
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                // 页面隐藏时暂停更新
                if (updateTimer) {
                    clearTimeout(updateTimer);
                    updateTimer = null;
                }
            } else {
                // 页面显示时恢复更新
                if (!updateTimer && !isUpdating) {
                    updateStats();
                    if (window.scheduleUpdate) {
                        window.scheduleUpdate();
                    }
                }
            }
        });
    </script>
</body>
</html>
